<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); max-width: 400px; width: 100%; }
        h2 { text-align: center; margin-bottom: 5px; color: #333; font-size: 24px; }
        .subtitle { text-align: center; color: #888; font-size: 14px; margin-bottom: 25px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; color: #555; font-weight: 600; font-size: 14px; }
        input { width: 100%; padding: 12px 14px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 15px; }
        input:focus { outline: none; border-color: #667eea; }
        .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 8px; }
        .error { background: #fdecea; color: #d32f2f; padding: 10px; border-radius: 8px; text-align: center; margin-bottom: 15px; font-size: 14px; }
        .link { text-align: center; margin-top: 20px; font-size: 14px; }
        .link a { color: #667eea; text-decoration: none; font-weight: 600; }
        .user-box { text-align: center; margin-bottom: 20px; }
        .user-box img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid #667eea; }
        .user-box p { color: #333; font-weight: 600; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="container">
        {% if not user %}
            <h2>Forgot Password</h2>
            <p class="subtitle">Enter your email and role to continue</p>

            {% if error %}<p class="error">{{ error }}</p>{% endif %}

            <form method="POST" action="/forgot-password">
                <div class="form-group">
                    <label>I am a</label>
                    <select name="role" required style="width:100%;padding:12px;border:2px solid #e0e0e0;border-radius:8px;font-size:15px;">
                        <option value="student">Student</option>
                        <option value="teacher">Teacher</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" required>
                </div>
                <button type="submit" class="btn">Continue</button>
            </form>
        {% else %}
            <h2>Reset Password</h2>
            <p class="subtitle">Confirm this is you, then set a new password</p>

            {% if error %}<p class="error">{{ error }}</p>{% endif %}

            <div class="user-box">
                <img src="{{ photo }}" alt="Profile">
                <p>{{ user_name }}</p>
            </div>

            <form method="POST" action="/reset-password">
                <input type="hidden" name="role" value="{{ role }}">
                <input type="hidden" name="email" value="{{ email }}">
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" name="new_password" required>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" name="confirm_password" required>
                </div>
                <button type="submit" class="btn">Reset Password</button>
            </form>
        {% endif %}

        <p class="link"><a href="/">← Back to Home</a></p>
    </div>
</body>
</html>
