<!DOCTYPE html>
<html>
<head>
    <title>Student Registration</title>
</head>
<body>
    <h2>Student Registration</h2>
    <form method="POST" action="/register" enctype="multipart/form-data">
        <input type="text" name="name" placeholder="Full Name" required><br><br>
        <input type="text" name="roll_number" placeholder="Roll Number" required><br><br>
        <input type="text" name="class_name" placeholder="Class (e.g. CSE-A)" required><br><br>
        <input type="text" name="section" placeholder="Section" required><br><br>
        <input type="email" name="email" placeholder="Email" required><br><br>
        <input type="password" name="password" placeholder="Password" required><br><br>
        <input type="file" name="photo" accept="image/*" required><br><br>
        <button type="submit">Register</button>
    </form>
</body>
</html>
